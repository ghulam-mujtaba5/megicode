<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Brand background -->
  <rect width="400" height="400" rx="16" fill="#1d2027"/>

  <!-- Megicode <M> logo mark — scaled & centered from logo-icon.svg -->
  <g transform="translate(60, 56) scale(4)">
    <!-- M vertical legs -->
    <path d="M19.6875 50.3125V21.875" stroke="#E8F0FE" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50.3125 50.3125V21.875" stroke="#E8F0FE" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- M centre diagonals -->
    <path d="M19.6875 21.875L35 39.375" stroke="#E8F0FE" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50.3125 21.875L35 39.375" stroke="#E8F0FE" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Code brackets < > -->
    <path d="M13.125 43.75L6.5625 35L13.125 26.25" stroke="#4573DF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M56.875 26.25L63.4375 35L56.875 43.75" stroke="#4573DF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Node dots — outer glow -->
    <circle cx="19.6875" cy="21.875" r="3.8" fill="url(#lg2)" opacity="0.6"/>
    <circle cx="50.3125" cy="21.875" r="3.8" fill="url(#lg2)" opacity="0.6"/>
    <circle cx="35" cy="39.375" r="3.8" fill="url(#lg2)" opacity="0.6"/>
    <!-- Node dots — core -->
    <circle cx="19.6875" cy="21.875" r="2.6" fill="url(#lg3)"/>
    <circle cx="50.3125" cy="21.875" r="2.6" fill="url(#lg3)"/>
    <circle cx="35" cy="39.375" r="2.6" fill="url(#lg3)"/>
    <!-- Node dots — highlight -->
    <circle cx="19.6875" cy="21.875" r="1.3" fill="url(#lg4)" opacity="0.9"/>
    <circle cx="50.3125" cy="21.875" r="1.3" fill="url(#lg4)" opacity="0.9"/>
    <circle cx="35" cy="39.375" r="1.3" fill="url(#lg4)" opacity="0.9"/>
  </g>

  <defs>
    <!-- M legs gradient (white → light blue) -->
    <linearGradient id="lg0" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="white"/>
      <stop offset="0.5" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#CFE8EF"/>
    </linearGradient>
    <!-- M diagonals gradient -->
    <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="white"/>
      <stop offset="0.5" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#CFE8EF"/>
    </linearGradient>
    <!-- Node outer glow -->
    <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#4573DF"/>
      <stop offset="1" stop-color="#2D4FA2"/>
    </linearGradient>
    <!-- Node core -->
    <linearGradient id="lg3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#B0D4F0"/>
    </linearGradient>
    <!-- Node highlight -->
    <linearGradient id="lg4" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#D0E8FF"/>
    </linearGradient>
  </defs>
</svg>
